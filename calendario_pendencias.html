<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário de Prazos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F4EF;--surface:#FFFFFF;--border:#E2DDD5;--text:#1A1714;--muted:#8A8178;--today-bg:#FFF9E6;--today-border:#D4A017;--ip-color:#1C4A7A;--ip-light:#E8F0FA;--ip-accent:#3B7DBF;--vr-color:#7A1C1C;--vr-light:#FAE8E8;--vr-accent:#BF3B3B;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  #loadingScreen{position:fixed;inset:0;background:var(--text);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
  #loadingScreen h2{font-family:'DM Serif Display',serif;font-size:24px;color:white;font-weight:400;}
  #loadingScreen p{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;}
  .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#4ade80;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #syncBar{display:none;position:fixed;top:0;left:0;right:0;z-index:8000;background:#166534;color:white;text-align:center;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;padding:6px;}
  header{background:var(--text);color:white;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .header-title h1{font-family:'DM Serif Display',serif;font-size:21px;font-weight:400;}
  .header-title span{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.38);letter-spacing:2px;text-transform:uppercase;}
  .header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .filter-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.38);font-family:'DM Mono',monospace;}
  .filter-btn{padding:6px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.18);background:transparent;color:rgba(255,255,255,0.6);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;}
  .filter-btn:hover{border-color:rgba(255,255,255,0.45);color:white;}
  .filter-btn.active{background:white;border-color:white;color:var(--text);}
  .filter-btn.active.ip{background:var(--ip-light);border-color:var(--ip-accent);color:var(--ip-color);}
  .filter-btn.active.vr{background:var(--vr-light);border-color:var(--vr-accent);color:var(--vr-color);}
  .hd{width:1px;height:22px;background:rgba(255,255,255,0.14);}
  .add-btn{padding:7px 16px;border-radius:100px;border:none;background:#4ade80;color:#052e16;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .add-btn:hover{background:#86efac;transform:translateY(-1px);}
  .legend-bar{display:flex;gap:6px;padding:10px 28px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;}
  .legend-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-right:4px;}
  .legend-chip{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;cursor:pointer;transition:opacity .15s;user-select:none;}
  .legend-chip.dim{opacity:0.3;}
  .legend-dot{width:7px;height:7px;border-radius:50%;}
  .calendar-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:var(--surface);}
  .month-label{font-family:'DM Serif Display',serif;font-size:19px;font-weight:400;}
  .nav-btns{display:flex;gap:7px;}
  .nav-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text);}
  .nav-btn:hover{background:var(--bg);}
  .nav-btn.tnav{width:auto;padding:0 11px;border-radius:20px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;}
  .stats-bar{display:flex;gap:18px;padding:9px 28px;background:var(--surface);border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;flex-wrap:wrap;align-items:center;}
  .stat{display:flex;align-items:center;gap:5px;}
  .stat-dot{width:7px;height:7px;border-radius:50%;}
  .stat-dot.ip{background:var(--ip-accent);}.stat-dot.vr{background:var(--vr-accent);}.stat-dot.nd{background:var(--muted);}
  .sync-btn{margin-left:auto;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .15s;}
  .sync-btn:hover{background:var(--bg);color:var(--text);}
  .calendar-wrap{padding:18px 28px 36px;}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
  .weekday{text-align:center;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:4px 0;}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .day-cell{min-height:96px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 6px;}
  .day-cell.empty{background:transparent;border-color:transparent;}
  .day-cell.today{background:var(--today-bg);border-color:var(--today-border);}
  .day-num{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:4px;}
  .day-cell.today .day-num{color:var(--text);font-weight:700;}
  .today-badge{font-size:8px;background:var(--today-border);color:white;padding:1px 5px;border-radius:100px;font-family:'DM Mono',monospace;}
  .event-pill{display:flex;align-items:stretch;border-radius:5px;margin-bottom:3px;cursor:pointer;transition:opacity .12s,transform .12s;overflow:hidden;border:1px solid transparent;}
  .event-pill:hover{opacity:.82;transform:translateX(1px);}
  .event-pill.done{opacity:.4;}
  .event-pill.done .pill-text{text-decoration:line-through;}
  .event-pill.recurring{border-style:dashed;}
  .pill-member-bar{width:5px;flex-shrink:0;}
  .pill-body{flex:1;padding:3px 6px;}
  .pill-text{font-size:10px;line-height:1.4;}
  .pill-meta{font-family:'DM Mono',monospace;font-size:8px;opacity:.5;text-transform:uppercase;}
  .recur-badge{display:inline-block;font-size:7px;background:rgba(0,0,0,0.12);border-radius:3px;padding:0 3px;margin-left:3px;vertical-align:middle;font-family:'DM Mono',monospace;}
  .event-pill.ip{background:var(--ip-light);border-color:rgba(59,125,191,.2);color:var(--ip-color);}
  .event-pill.vr{background:var(--vr-light);border-color:rgba(191,59,59,.2);color:var(--vr-color);}
  .event-pill.ipvr{background:#F0EEF8;border-color:rgba(100,100,191,.2);color:#333;}
  .more-badge{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;padding:1px 4px;}
  .section-block{margin-top:24px;background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;}
  .section-header{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .section-header h3{font-family:'DM Serif Display',serif;font-size:15px;font-weight:400;color:var(--muted);}
  .section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:1px;background:var(--border);}
  .nd-item{background:var(--surface);padding:11px 16px;cursor:pointer;transition:background .12s;display:flex;gap:10px;}
  .nd-item:hover{background:var(--bg);}
  .nd-item.hidden{display:none;}
  .nd-item.done{opacity:.45;}
  .nd-item.done .nd-task{text-decoration:line-through;}
  .nd-member-bar{width:4px;border-radius:4px;flex-shrink:0;align-self:stretch;}
  .nd-content{flex:1;}
  .nd-client{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace;margin-bottom:2px;}
  .nd-task{font-size:12px;font-weight:500;margin-bottom:4px;}
  .nd-tags{display:flex;gap:5px;flex-wrap:wrap;}
  .nd-tag{font-size:9px;padding:2px 7px;border-radius:100px;font-family:'DM Mono',monospace;font-weight:500;}
  .nd-tag.ip{background:var(--ip-light);color:var(--ip-color);}
  .nd-tag.vr{background:var(--vr-light);color:var(--vr-color);}
  .nd-tag.ipvr{background:#EEE;color:#333;}
  .nd-tag.member{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
  .nd-tag.recur{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;}
  .done-toggle{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);cursor:pointer;background:none;border:1px solid var(--border);border-radius:20px;padding:2px 10px;}
  .done-toggle:hover{background:var(--bg);}
  .overlay{position:fixed;inset:0;background:rgba(26,23,20,.52);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
  .overlay.open{opacity:1;pointer-events:all;}
  .modal{background:var(--surface);border-radius:16px;padding:26px;max-width:430px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(12px);transition:transform .2s;position:relative;max-height:90vh;overflow-y:auto;}
  .overlay.open .modal{transform:translateY(0);}
  .modal-close{position:absolute;top:16px;right:16px;width:27px;height:27px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s;}
  .modal-close:hover{background:var(--bg);color:var(--text);}
  .modal-team{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
  .modal-team.ip{color:var(--ip-accent);}.modal-team.vr{color:var(--vr-accent);}.modal-team.ipvr{color:#666;}
  .modal-task{font-family:'DM Serif Display',serif;font-size:19px;font-weight:400;margin-bottom:16px;line-height:1.3;}
  .modal-row{display:flex;gap:6px;align-items:baseline;margin-bottom:7px;font-size:13px;}
  .lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);min-width:90px;}
  .val{color:var(--text);font-weight:500;}
  .modal-obs{background:var(--bg);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--muted);margin-top:12px;font-style:italic;}
  .modal-member-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;}
  .modal-actions{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
  .btn-done{flex:1;padding:9px;border-radius:8px;border:1.5px solid #86EFAC;background:transparent;color:#166534;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
  .btn-done:hover{background:#F0FDF4;}
  .btn-done.undo{border-color:var(--border);color:var(--muted);}
  .btn-done.undo:hover{background:var(--bg);}
  .btn-edit{padding:9px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
  .btn-edit:hover{background:var(--bg);color:var(--text);}
  .btn-del{padding:9px 14px;border-radius:8px;border:1.5px solid #FCA5A5;background:transparent;color:#991B1B;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;}
  .btn-del:hover{background:#FEF2F2;}
  #formOverlay{z-index:1100;}
  .form-modal{background:var(--surface);border-radius:16px;padding:26px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);transform:translateY(12px);transition:transform .2s;position:relative;max-height:92vh;overflow-y:auto;}
  .overlay.open .form-modal{transform:translateY(0);}
  .form-modal h2{font-family:'DM Serif Display',serif;font-size:19px;font-weight:400;margin-bottom:18px;}
  .fr{margin-bottom:13px;}
  .fr label{display:block;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
  .fr input,.fr select,.fr textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;}
  .fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--muted);background:white;}
  .fr textarea{min-height:58px;resize:vertical;}
  .fr2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
  .recur-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:13px;display:none;}
  .recur-box.show{display:block;}
  .recur-box-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
  .recur-toggle{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;background:var(--bg);cursor:pointer;margin-bottom:13px;transition:all .15s;}
  .recur-toggle:hover{border-color:var(--muted);}
  .recur-toggle input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--text);}
  .recur-toggle span{font-size:13px;color:var(--text);}
  .form-actions{display:flex;gap:9px;margin-top:18px;}
  .btn-save{flex:1;padding:10px;border-radius:8px;border:none;background:var(--text);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
  .btn-save:hover{background:#333;}
  .btn-cancel{padding:10px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}
  .btn-cancel:hover{background:var(--bg);}
  .toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:white;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.green{background:#166534;}.toast.red{background:#991B1B;}.toast.yellow{background:#92400E;}
  .sheet-status{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);margin-left:8px;}
  .sheet-status.ok{color:#166534;}.sheet-status.err{color:#991B1B;}
</style>
</head>
<body>
<div id="loadingScreen">
  <div class="spinner"></div>
  <h2>Calendário de Prazos</h2>
  <p id="loadingMsg">Iniciando...</p>
</div>
<div id="syncBar"></div>

<header>
  <div class="header-title">
    <h1>Calendário de Prazos</h1>
    <span>Organização de Pendências</span>
  </div>
  <div class="header-actions">
    <span class="filter-label">Equipe</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-btn ip" onclick="setFilter('ip',this)">IP</button>
    <button class="filter-btn vr" onclick="setFilter('vr',this)">VR</button>
    <div class="hd"></div>
    <button class="add-btn" onclick="openForm(null)">＋ Nova pendência</button>
  </div>
</header>
<div class="legend-bar" id="legendBar"><span class="legend-label">Membros</span></div>
<div class="calendar-nav">
  <div class="nav-btns">
    <button class="nav-btn" onclick="changeMonth(-1)">←</button>
    <button class="nav-btn" onclick="changeMonth(1)">→</button>
  </div>
  <span class="month-label" id="monthLabel"></span>
  <button class="nav-btn tnav" onclick="goToday()">hoje</button>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-dot ip"></div>IP: <strong id="ipCount">—</strong></div>
  <div class="stat"><div class="stat-dot vr"></div>VR: <strong id="vrCount">—</strong></div>
  <div class="stat"><div class="stat-dot nd"></div>Sem data: <strong id="ndCount">—</strong></div>
  <button class="sync-btn" onclick="syncFromSheets()">↻ Sincronizar</button>
  <span class="sheet-status" id="sheetStatus"></span>
</div>
<div class="calendar-wrap">
  <div class="weekdays">
    <div class="weekday">Dom</div><div class="weekday">Seg</div><div class="weekday">Ter</div>
    <div class="weekday">Qua</div><div class="weekday">Qui</div><div class="weekday">Sex</div><div class="weekday">Sáb</div>
  </div>
  <div class="calendar-grid" id="calGrid"></div>
  <div class="section-block" id="noDateSec">
    <div class="section-header"><span>📋</span><h3>Sem prazo definido</h3></div>
    <div class="section-grid" id="noDateList"></div>
  </div>
  <div class="section-block" id="doneSec" style="display:none">
    <div class="section-header">
      <span>✅</span><h3>Concluídas</h3>
      <button class="done-toggle" id="doneToggle" onclick="toggleDoneList()">mostrar</button>
    </div>
    <div class="section-grid" id="doneList" style="display:none"></div>
  </div>
</div>

<div class="overlay" id="detailOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;">
      <div class="modal-team" id="dTeam"></div>
      <div class="modal-member-chip" id="dMemberChip"></div>
    </div>
    <div class="modal-task" id="dTask"></div>
    <div class="modal-row"><span class="lbl">Cliente</span><span class="val" id="dClient"></span></div>
    <div class="modal-row"><span class="lbl">Caso</span><span class="val" id="dCase"></span></div>
    <div class="modal-row"><span class="lbl">Prazo Fatal</span><span class="val" id="dDeadline"></span></div>
    <div class="modal-row"><span class="lbl">Prazo Interno</span><span class="val" id="dInternal"></span></div>
    <div class="modal-row" id="dRecurRow" style="display:none"><span class="lbl">Recorrência</span><span class="val" id="dRecur"></span></div>
    <div class="modal-obs" id="dObs" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn-done" id="dDoneBtn"></button>
      <button class="btn-edit" onclick="editCurrent()">✏️ Editar</button>
      <button class="btn-del" onclick="deleteCurrent()">🗑</button>
    </div>
  </div>
</div>

<div class="overlay" id="formOverlay">
  <div class="form-modal">
    <button class="modal-close" onclick="closeForm()">✕</button>
    <h2 id="formTitle">Nova Pendência</h2>
    <div class="fr"><label>Pendência / Tarefa *</label><textarea id="fPend" placeholder="Descreva a pendência..."></textarea></div>
    <div class="fr2">
      <div class="fr"><label>Cliente *</label><input type="text" id="fCli" placeholder="Ex: CRAS"></div>
      <div class="fr"><label>Caso</label><input type="text" id="fCaso" placeholder="Ex: Execução BS2"></div>
    </div>
    <div class="fr2">
      <div class="fr"><label>Equipe *</label>
        <select id="fEq"><option value="IP">Equipe IP</option><option value="VR">Equipe VR</option><option value="IPVR">Equipe IP e VR</option></select>
      </div>
      <div class="fr"><label>Membro *</label>
        <select id="fMem"><option value="AP">AP</option><option value="PP">PP</option><option value="GD">GD</option><option value="VR">VR</option><option value="LA">LA</option><option value="JF">JF</option><option value="IP">IP</option><option value="EB">EB</option><option value="OE">Outra equipe</option></select>
      </div>
    </div>
    <label class="recur-toggle"><input type="checkbox" id="fIsRecurring" onchange="toggleRecurBox()"><span>🔁 Tarefa recorrente</span></label>
    <div class="recur-box" id="recurBox">
      <div class="recur-box-title">Configuração de recorrência</div>
      <div class="fr2">
        <div class="fr"><label>Frequência</label>
          <select id="fFreq" onchange="toggleDayPicker()"><option value="diaria">Diária</option><option value="semanal">Semanal</option><option value="quinzenal">Quinzenal</option><option value="mensal">Mensal</option></select>
        </div>
        <div class="fr" id="dayPickerWrap"><label>Dia da semana</label>
          <select id="fDiaSemana"><option value="0">Domingo</option><option value="1">Segunda</option><option value="2">Terça</option><option value="3">Quarta</option><option value="4">Quinta</option><option value="5">Sexta</option><option value="6">Sábado</option></select>
        </div>
      </div>
      <div class="fr2">
        <div class="fr"><label>Início *</label><input type="date" id="fRecurStart"></div>
        <div class="fr"><label>Término (opcional)</label><input type="date" id="fRecurEnd"></div>
      </div>
    </div>
    <div id="normalDates">
      <div class="fr2">
        <div class="fr"><label>Prazo Fatal</label><input type="date" id="fPF"></div>
        <div class="fr"><label>Prazo Interno</label><input type="date" id="fPI"></div>
      </div>
    </div>

async function sheetsGet(){

async function saveAllToScript(allRows){

  });
  const d=await r.json();
  if(d.error)throw new Error(d.error);

}

// Try to connect to Sheets in background — show data immediately regardless
async function tryConnectSheets(){
  try{
    const d=await sheetsGet();
    const all=d.values||[];
    const rows=all.slice(1).filter(r=>r[0]);
    if(rows.length>0){
      prazos=rows.map(rowToP);
      render();
      setSheetStatus(true,'✓ Google Sheets conectado');
    } else {
      // Sheet empty — save seed data
      const allRows=[HDRS,...prazos.map(pToRow)];
      await saveAllToScript(allRows);
      setSheetStatus(true,'✓ Google Sheets conectado');
    }
  }catch(e){
    setSheetStatus(false,'⚠ Offline — salvando localmente');
    console.warn('Sheets offline:',e.message);
  }
}

async function saveAll(){
  // Always keep local backup
  try{localStorage.setItem('prazos_backup',JSON.stringify(prazos));}catch(e){}
  if(sheetsConnected){
    const allRows=[HDRS,...prazos.map(pToRow)];
    await saveAllToScript(allRows);
  }
}

async function syncFromSheets(){
  if(!sheetsConnected){toast('Sem conexão com o Google Sheets','red');return;}
  showSync('Sincronizando...');
  try{
    const d=await sheetsGet();
    const all=d.values||[];
    const rows=all.slice(1).filter(r=>r[0]);
    if(rows.length>0){prazos=rows.map(rowToP);render();toast('✓ Sincronizado!','green');}
    else{toast('Planilha vazia — dados locais mantidos','yellow');}
  }catch(e){toast('Erro: '+e.message,'red');}
  finally{hideSync();}
}

  '2027-01-20','2027-04-23',
]);
function isDiaUtil(d){
  const day=d.getDay();
  if(day===0||day===6)return false; // domingo ou sábado
  return!FERIADOS.has(toDateStr(d));
}

function toDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getRecurDates(p,y,m){
  if(!p.recorrente)return[];
  const start=p.recurStart?new Date(p.recurStart+'T12:00:00'):new Date();
  const end=p.recurEnd?new Date(p.recurEnd+'T12:00:00'):new Date(y,m+6,1);
  const mS=new Date(y,m,1),mE=new Date(y,m+1,0);
  const dates=[],cur=new Date(Math.max(start.getTime(),mS.getTime()));cur.setHours(12,0,0,0);
  if(p.freq==='diaria'){
    while(cur<=mE&&cur<=end){
      if(cur>=mS&&isDiaUtil(cur))dates.push(toDateStr(cur));
      cur.setDate(cur.getDate()+1);
    }
  }
  else if(p.freq==='semanal'){const td=parseInt(p.diaSemana)||0;while(cur.getDay()!==td)cur.setDate(cur.getDate()+1);while(cur<=mE&&cur<=end){if(cur>=mS)dates.push(toDateStr(cur));cur.setDate(cur.getDate()+7);}}
  else if(p.freq==='quinzenal'){const td=parseInt(p.diaSemana)||0;while(cur.getDay()!==td)cur.setDate(cur.getDate()+1);while(cur<=mE&&cur<=end){if(cur>=mS)dates.push(toDateStr(cur));cur.setDate(cur.getDate()+14);}}
  else if(p.freq==='mensal'){const dom=start.getDate();const c=new Date(y,m,dom,12);if(c>=start&&c<=end&&c>=mS&&c<=mE)dates.push(toDateStr(c));}
  return dates;
}
function recurLabel(p){if(!p.recorrente)return'';let s=FREQ_LABELS[p.freq]||p.freq;if((p.freq==='semanal'||p.freq==='quinzenal')&&p.diaSemana!=='')s+=` (${DAYS[parseInt(p.diaSemana)]})`;return s;}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}
function vis(p){const eqOk=eqFilter==='all'||(eqFilter==='ip'&&(p.equipe==='IP'||p.equipe==='IPVR'))||(eqFilter==='vr'&&(p.equipe==='VR'||p.equipe==='IPVR'));return eqOk&&(memFilter==='all'||p.membro===memFilter);}
function nextId(){return prazos.length?String(Math.max(...prazos.map(p=>parseInt(p.id)||0))+1):'1';}

function tl(eq){return eq==='IPVR'?'Equipe IP e VR':`Equipe ${eq}`;}
function setFilter(f,btn){eqFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function changeMonth(d){month+=d;if(month>11){month=0;year++;}if(month<0){month=11;year--;}render();}
function goToday(){const t=new Date();year=t.getFullYear();month=t.getMonth();render();}

function buildLegend(){

  all.innerHTML=`<div class="legend-dot" style="background:#888"></div>Todos`;
  all.onclick=()=>{memFilter='all';render();};bar.appendChild(all);
  Object.entries(MEMBERS).forEach(([k,m])=>{
    const c=document.createElement('div');c.className='legend-chip'+(memFilter===k?'':(memFilter==='all'?'':' dim'));
    c.innerHTML=`<div class="legend-dot" style="background:${m.color}"></div>${m.label}`;
    c.onclick=()=>{memFilter=(memFilter===k)?'all':k;render();};bar.appendChild(c);
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  buildLegend();
  const months=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  document.getElementById('monthLabel').textContent=`${months[month]} ${year}`;
  const t=new Date(),ts=toDateStr(t);
  const first=new Date(year,month,1).getDay(),days=new Date(year,month+1,0).getDate();
  const active=prazos.filter(p=>!p.done);
  document.getElementById('ipCount').textContent=active.filter(p=>vis(p)&&(p.equipe==='IP'||p.equipe==='IPVR')).length;
  document.getElementById('vrCount').textContent=active.filter(p=>vis(p)&&(p.equipe==='VR'||p.equipe==='IPVR')).length;
  document.getElementById('ndCount').textContent=active.filter(p=>vis(p)&&!p.prazoFatal&&!p.recorrente).length;

  const byDate={};
  const doneRecurItems=[]; // collect completed recurring occurrences for done section
  function add(ds,p,ro){if(!byDate[ds])byDate[ds]=[];byDate[ds].push({...p,_ro:ro});}
  prazos.filter(p=>vis(p)).forEach(p=>{
    if(p.recorrente){
      getRecurDates(p,year,month).forEach(ds=>{
        const isDone=(p.doneDates||[]).includes(ds);
        if(isDone){
          // Completed occurrence goes to done section, not calendar
          doneRecurItems.push({...p,done:true,_recurDate:ds,_ro:true,_recurDateFmt:fmt(ds)});
        } else if(!p.done){
          add(ds,{...p,done:false,_recurDate:ds},true);
        }
      });
    } else if(!p.done&&p.prazoFatal){
      const[py,pm]=p.prazoFatal.split('-').map(Number);
      if(py===year&&pm-1===month)add(p.prazoFatal,p,false);
    }
  });

  const grid=document.getElementById('calGrid');grid.innerHTML='';
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='day-cell empty';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell=document.createElement('div');cell.className='day-cell'+(ds===ts?' today':'');
    const dn=document.createElement('div');dn.className='day-num';dn.innerHTML=d+(ds===ts?' <span class="today-badge">Hoje</span>':'');cell.appendChild(dn);
    const evts=byDate[ds]||[];
    evts.slice(0,3).forEach(p=>{
      const isFatal=!p._ro&&p.prazoFatal===ds; // highlight prazo fatal
      const pill=document.createElement('div');
      pill.className=`event-pill ${pc(p.equipe)}${p._ro?' recurring':''}${isFatal?' fatal-pill':''}`;
      if(isFatal)pill.style.borderLeft='3px solid #991B1B';
      const s=p.pendencia.length>28?p.pendencia.slice(0,28)+'…':p.pendencia;
      const fatalBadge=isFatal?'<span style="font-size:7px;background:#991B1B;color:white;border-radius:3px;padding:0 3px;margin-left:3px;font-family:DM Mono,monospace;vertical-align:middle">FATAL</span>':'';
      pill.innerHTML=`<div class="pill-member-bar" style="background:${mc(p.membro)}"></div><div class="pill-body"><div class="pill-text">${s}${p._ro?'<span class="recur-badge">↻</span>':''}${fatalBadge}</div><div class="pill-meta">${p.cliente} · <span style="color:${mc(p.membro)};font-weight:600">${p.membro}</span></div></div>`;
      pill.onclick=()=>openDetail(p);cell.appendChild(pill);
    });
    if(evts.length>3){const mb=document.createElement('div');mb.className='more-badge';mb.style.cursor='pointer';mb.style.color='var(--ip-accent)';mb.style.fontWeight='600';mb.textContent='+' + (evts.length-3) + ' mais';mb.onclick=(()=>{const e=evts,d=ds;return()=>openDayModal(d,e);})();cell.appendChild(mb);}
    grid.appendChild(cell);
  }

  const noDate=prazos.filter(p=>!p.done&&!p.prazoFatal&&!p.recorrente);
  const nl=document.getElementById('noDateList');nl.innerHTML='';
  noDate.forEach(p=>{
    const item=document.createElement('div');item.className='nd-item'+(vis(p)?'':' hidden');
    item.innerHTML=`<div class="nd-member-bar" style="background:${mc(p.membro)}"></div><div class="nd-content"><div class="nd-client">${p.cliente}</div><div class="nd-task">${p.pendencia}</div><div class="nd-tags"><span class="nd-tag ${pc(p.equipe)}">${tl(p.equipe)}</span><span class="nd-tag member" style="color:${mc(p.membro)};border-color:${mc(p.membro)}33">${p.membro}</span>${p.prazoInterno?`<span class="nd-tag member">Interno: ${fmt(p.prazoInterno)}</span>`:''}</div></div>`;
    item.onclick=()=>openDetail(p);nl.appendChild(item);
  });
  document.getElementById('noDateSec').style.display=noDate.some(p=>vis(p))?'block':'none';

  // Done: regular tasks + recurring occurrences done this month
  const doneRegular=prazos.filter(p=>p.done&&vis(p)&&!p.recorrente);
  const allDone=[...doneRegular,...doneRecurItems.filter(p=>vis(p))];
  document.getElementById('doneSec').style.display=allDone.length?'block':'none';
  const dl=document.getElementById('doneList');dl.innerHTML='';
  allDone.forEach(p=>{
    const item=document.createElement('div');item.className='nd-item done';
    const dateLabel=p._recurDate?` — ${fmt(p._recurDate)}`:'';
    item.innerHTML=`<div class="nd-member-bar" style="background:${mc(p.membro)};opacity:.4"></div><div class="nd-content"><div class="nd-client">${p.cliente}${dateLabel}</div><div class="nd-task">${p.pendencia}</div><div class="nd-tags"><span class="nd-tag ${pc(p.equipe)}">${tl(p.equipe)}</span><span class="nd-tag member">${p.membro}</span>${p.recorrente?`<span class="nd-tag recur">↻ ${recurLabel(p)}</span>`:''}</div></div>`;
    item.onclick=()=>openDetail(p);dl.appendChild(item);
  });
  document.getElementById('doneToggle').textContent=doneOpen?'ocultar':`mostrar (${allDone.length})`;
  document.getElementById('doneList').style.display=doneOpen?'grid':'none';
}
function toggleDoneList(){doneOpen=!doneOpen;render();}

// ── DAY MODAL ────────────────────────────────────────────────────────────────
function openDayModal(ds,evts){
  const[y,m,d]=ds.split('-');
  document.getElementById('dayModalTitle').textContent=`${d}/${m}/${y} — ${evts.length} pendências`;
  const list=document.getElementById('dayModalList');list.innerHTML='';
  evts.forEach(p=>{
    const item=document.createElement('div');
    item.style.cssText='display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;';
    item.innerHTML=`<div style="width:4px;border-radius:4px;background:${mc(p.membro)};flex-shrink:0"></div><div><div style="font-size:13px;font-weight:500;margin-bottom:3px">${p.pendencia}</div><div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${p.cliente} · <span style="color:${mc(p.membro)};font-weight:600">${p.membro}</span> · ${tl(p.equipe)}</div></div>`;
    item.onclick=()=>{closeDayModal();openDetail(p);};
    list.appendChild(item);
  });
  document.getElementById('dayModalOverlay').classList.add('open');
}
function closeDayModal(){document.getElementById('dayModalOverlay').classList.remove('open');}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function openDetail(p){
  currentId=p.id;
  document.getElementById('dTeam').textContent=tl(p.equipe);document.getElementById('dTeam').className=`modal-team ${pc(p.equipe)}`;
  const chip=document.getElementById('dMemberChip');chip.textContent=MEMBERS[p.membro]?.label||p.membro;chip.style.background=mc(p.membro,'light');chip.style.color=mc(p.membro);
  document.getElementById('dTask').textContent=p.pendencia;document.getElementById('dClient').textContent=p.cliente;document.getElementById('dCase').textContent=p.caso;
  document.getElementById('dDeadline').textContent=fmt(p.prazoFatal);document.getElementById('dInternal').textContent=fmt(p.prazoInterno);
  const rr=document.getElementById('dRecurRow');
  if(p.recorrente){rr.style.display='flex';document.getElementById('dRecur').textContent=recurLabel(p);}else{rr.style.display='none';}
  const obs=document.getElementById('dObs');if(p.obs){obs.textContent='⚠️ '+p.obs;obs.style.display='block';}else{obs.style.display='none';}
  const db=document.getElementById('dDoneBtn');db.textContent=p.done?'↩ Reabrir':'✓ Marcar como concluída';db.className=p.done?'btn-done undo':'btn-done';db.onclick=()=>toggleDone(p.id,p._ro?p._recurDate:null);
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');currentId=null;}
document.getElementById('detailOverlay').onclick=function(e){if(e.target===this)closeDetail();};

async function toggleDone(id,recurDate){
  const p=prazos.find(x=>x.id===id);if(!p)return;
  if(p.recorrente&&recurDate){
    // For recurring tasks: toggle just that specific date
    if(!p.doneDates)p.doneDates=[];
    const idx=p.doneDates.indexOf(recurDate);
    if(idx>=0){p.doneDates.splice(idx,1);}else{p.doneDates.push(recurDate);}
    const isDone=p.doneDates.includes(recurDate);
    closeDetail();render();
    showSync('Salvando...');
    try{await saveAll();hideSync();toast(isDone?'✓ Ocorrência concluída':'↩ Ocorrência reaberta','green');}
    catch(e){hideSync();toast('Erro ao salvar: '+e.message,'red');}
  } else {
    p.done=!p.done;closeDetail();render();
    showSync('Salvando...');
    try{await saveAll();hideSync();toast(p.done?'✓ Concluída':'↩ Reaberta','green');}
    catch(e){hideSync();toast('Erro ao salvar: '+e.message,'red');}
  }
}
async function deleteCurrent(){
  if(!currentId||!confirm('Excluir esta pendência?'))return;
  prazos=prazos.filter(p=>p.id!==currentId);closeDetail();render();
  showSync('Salvando...');
  try{await saveAll();hideSync();toast('Excluída','red');}
  catch(e){hideSync();toast('Erro: '+e.message,'red');}
}
function editCurrent(){const p=prazos.find(x=>x.id===currentId);if(!p)return;closeDetail();openForm(p);}

// ── FORM ──────────────────────────────────────────────────────────────────────
function toggleRecurBox(){const on=document.getElementById('fIsRecurring').checked;document.getElementById('recurBox').classList.toggle('show',on);document.getElementById('normalDates').style.display=on?'none':'block';toggleDayPicker();}
function toggleDayPicker(){const f=document.getElementById('fFreq').value;document.getElementById('dayPickerWrap').style.display=(f==='semanal'||f==='quinzenal')?'block':'none';}
function openForm(p){
  editingId=p?p.id:null;
  document.getElementById('formTitle').textContent=p?'Editar Pendência':'Nova Pendência';
  document.getElementById('fPend').value=p?p.pendencia:'';document.getElementById('fCli').value=p?p.cliente:'';
  document.getElementById('fCaso').value=p?p.caso:'';document.getElementById('fEq').value=p?p.equipe:'IP';
  document.getElementById('fMem').value=p?p.membro:'AP';document.getElementById('fPF').value=p&&p.prazoFatal?p.prazoFatal:'';
  document.getElementById('fPI').value=p&&p.prazoInterno?p.prazoInterno:'';document.getElementById('fObs').value=p&&p.obs?p.obs:'';
  const isR=!!(p&&p.recorrente);
  document.getElementById('fIsRecurring').checked=isR;document.getElementById('recurBox').classList.toggle('show',isR);
  document.getElementById('normalDates').style.display=isR?'none':'block';
  document.getElementById('fFreq').value=isR?(p.freq||'semanal'):'semanal';
  document.getElementById('fDiaSemana').value=isR?(p.diaSemana||'4'):'4';
  document.getElementById('fRecurStart').value=isR?(p.recurStart||''):'';
  document.getElementById('fRecurEnd').value=isR?(p.recurEnd||''):'';
  toggleDayPicker();
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fPend').focus(),100);
}
function closeForm(){document.getElementById('formOverlay').classList.remove('open');editingId=null;}
document.getElementById('formOverlay').onclick=function(e){if(e.target===this)closeForm();};

async function saveForm(){
  const pend=document.getElementById('fPend').value.trim(),cli=document.getElementById('fCli').value.trim();
  if(!pend||!cli){toast('Preencha a pendência e o cliente','yellow');return;}
  const isR=document.getElementById('fIsRecurring').checked;
  if(isR&&!document.getElementById('fRecurStart').value){toast('Defina a data de início da recorrência','yellow');return;}
  const btn=document.getElementById('saveBtn');btn.textContent='Salvando...';btn.disabled=true;
  try{
    const base={pendencia:pend,cliente:cli,caso:document.getElementById('fCaso').value.trim()||'',equipe:document.getElementById('fEq').value,membro:document.getElementById('fMem').value,obs:document.getElementById('fObs').value.trim()||null,done:false,recorrente:isR,freq:isR?document.getElementById('fFreq').value:'',diaSemana:isR?document.getElementById('fDiaSemana').value:'',recurStart:isR?document.getElementById('fRecurStart').value:'',recurEnd:isR?document.getElementById('fRecurEnd').value:'',prazoFatal:isR?null:(document.getElementById('fPF').value||null),prazoInterno:isR?null:(document.getElementById('fPI').value||null)};
    if(editingId){const p=prazos.find(x=>x.id===editingId);Object.assign(p,base);}
    else{
      const nova={id:nextId(),...base};prazos.push(nova);
      if(!isR&&nova.prazoFatal){const[y,m]=nova.prazoFatal.split('-').map(Number);year=y;month=m-1;}
      else if(isR&&base.recurStart){const[y,m]=base.recurStart.split('-').map(Number);year=y;month=m-1;}
    }
    await saveAll();closeForm();render();toast('✓ Salvo!','green');
  }catch(e){toast('Erro: '+e.message,'red');console.error(e);}
  finally{btn.textContent='Salvar';btn.disabled=false;}
}

function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show${type?' '+type:''}`;setTimeout(()=>t.className='toast',3000);}
document.getElementById('dayModalOverlay').onclick=function(e){if(e.target===this)closeDayModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeForm();closeDayModal();}});

// ── INIT — show data immediately, connect Sheets in background ────────────────
// First check localStorage for any newer saved data
try{
  const backup=localStorage.getItem('prazos_backup');
  if(backup){const saved=JSON.parse(backup);if(saved.length>0)prazos=saved;}
}catch(e){}

// Show calendar right away with whatever data we have
const t=new Date();year=t.getFullYear();month=t.getMonth();
render();
document.getElementById('loadingScreen').style.display='none';

// Then try to connect to Sheets in background
setSheetStatus(false,'Conectando ao Google Sheets...');
tryConnectSheets();
</script>
</body>
